name: Deploy DN Solutions Demo (Main/Docs)

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**' # docs 폴더 변경으로 인한 무한 루프 방지

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install django djangorestframework dj-database-url python-dotenv requests httpx whitenoise gunicorn asgiref

      - name: Generate Static Portfolio (docs/)
        run: |
          export DJANGO_SECRET_KEY="deploy-dummy-key"
          export DEBUG="True"
          export DATABASE_URL="sqlite:///db.sqlite3"
          python scripts/export_static_demo.py

      - name: Commit and Push to Main Branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git commit -m "docs: automatic static demo generation for GitHub Pages" || echo "No changes to commit"
          git push origin main
